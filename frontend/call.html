<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/stylesIndex.css" />

    <title>Comece Agora</title>

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("assets/images/2416e43d653933f1c510a598eee3801e.jpg");
            /* caminho da imagem */
            background-size: cover;
            /* cobre toda a tela */
            background-position: center;
            /* centraliza a imagem */
            background-repeat: no-repeat;
            /* evita repetir */
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.363);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <div class="container-xl mx-auto">

        <div class="box-start text-center">
            <img src="./assets/images/2-removebg-preview.png" class="rounded float-start"
                style="width: 350px; margin-right: 25px;" />
            <h3 class="mb-4">Comece Agora</h3>

            <div class="option-card d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#exampleModal"
                data-bs-whatever="Cliente">

                <div class="icon-box icon-client me-3">
                    <i class="bi bi-person-circle" style="color: #2f67d8;"></i>
                </div>

                <div class="text-start">
                    <h5 style="color: #2f67d8;">Sou Cliente</h5>
                    <div class="md text-muted">
                        Preciso de interpretação em Libras
                    </div>
                </div>

            </div>


            <div class="option-card d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#exampleModal"
                data-bs-whatever="Profissional">

                <div class="icon-box icon-interpreter me-3">
                    <i class="bi bi-award" style="color: purple;"></i>
                </div>

                <div class="text-start">
                    <h5 style="color: #2f67d8;">Sou Intérprete</h5>
                    <div class="md text-muted">
                        Quero oferecer meus serviços
                    </div>
                </div>

            </div>


            <div class="footer-text">
            Visite nosso site institucional <a href="#">clicando aqui.</a>
            </div>

            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-4" id="exampleModalLabel">Logar</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="loginForm">

                                <div class="form-floating mb-3 mt-2">
                                    <input class="form-control" id="inputEmail" type="email"
                                        placeholder="name@example.com" />
                                    <label for="inputEmail">Endereço de E-mail</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="inputPassword" type="password"
                                        placeholder="Password" />
                                    <label for="inputPassword">Senha</label>
                                </div>
                                <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                    <a class="small" href="password.html">Esqueceu a senha?</a>
                                    <a data-bs-toggle="modal" href="#modalRegistrar">Quer se cadastrar?</a>
                                </div>
                                <div class="modal-footer mt-3">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Fechar</button>
                                    <button type="submit" class="btn btn-primary">Entrar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="modal fade" id="modalRegistrar" tabindex="-1" aria-labelledby="modalRegistrarLabel"
            aria-hidden="true">
            <div class="modal-dialog  modal-lg modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-4" id="modalRegistrarLabel">Logar</h1>                        
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">                        
                        <form id="registerForm" class="row g-4 needs-validation mt-2">
                            <div class="row mb-3" style="padding-right: 0px; padding-left: 20px;">
                                <div class="col-md-6">
                                    <div class="form-floating mb-3 mb-md-0">
                                        <input class="form-control" id="inputFirstName" type="text"
                                            placeholder="Enter your first name" required />
                                        <label for="inputFirstName">Nome</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input class="form-control" id="inputLastName" type="text"
                                            placeholder="Enter your last name" required />
                                        <label for="inputLastName">Sobrenome</label>
                                    </div>
                                </div>
                                <div class="col-md mt-3">
                                    <div class="form-floating">
                                        <input class="form-control" id="inputEmailRegister" type="email"
                                            placeholder="name@example.com" required />
                                        <label for="inputEmailRegister">E-mail</label>
                                    </div>
                                </div>
                            </div>
                            <div class="row mb-3"  style="padding-right: 0px; padding-left: 20px;">
                                <div class="col-md-6">
                                    <div class="form-floating mb-3 mb-md-0">
                                        <input class="form-control" id="inputPasswordRegister" type="password"
                                            placeholder="Create a password" required />
                                        <label for="inputPasswordRegister">Senha</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating mb-3 mb-md-0">
                                        <input class="form-control" id="inputPasswordRegisterConfirm" type="password"
                                            placeholder="Confirm password" required />
                                        <label for="inputPasswordRegisterConfirm">Confirmar Senha</label>
                                    </div>
                                </div>
                                <span  class="d-flex justify-content-center p-0 mt-3 mb-0" id="liveToast"></span>
                            </div>
                            <div class="mt-0">
                                <div class="d-grid"><a id="liveToastBtn" class="btn btn-primary btn-block" href="#"
                                        onclick="salvarProfissional()">Cadastrar</a></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modalEsqueciSenha" tabindex="-1" aria-labelledby="modalEsqueciSenhaLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-4" id="modalEsqueciSenhaLabel">Logar</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">

                        <div class="form-floating mb-3 mt-2">
                            <input class="form-control" id="inputEmail" type="email" placeholder="name@example.com" />
                            <label for="inputEmail">Endereço de E-mail</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input class="form-control" id="inputPassword" type="password" placeholder="Password" />
                            <label for="inputPassword">Senha</label>
                        </div>
                        <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                            <a class="small" href="password.html">Esqueceu a senha?</a>
                            <a class="small" href="register.html">Quer se cadastrar?</a>
                        </div>
                        <div class="modal-footer mt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                            <button type="submit" class="btn btn-primary">Entrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cliente.js" defer></script>
    <script src="js/scripts.js" defer></script>
    <script src="js/register.js"></script>
</body>

</html>
